services:
  - type: web
    name: trucksight
    runtime: docker
    plan: starter
    envVars:
      - key: GEMINI_API_KEY
        sync: false
      - key: APP_PIN
        sync: false
      - key: SESSION_SECRET
        generateValue: true
      - key: NODE_ENV
        value: production
      - key: RENDER
        value: "true"
      - key: DATABASE_SSL
        value: no-verify
      - key: DATABASE_URL
        fromDatabase:
          name: trucksight-db
          property: connectionString

databases:
  - name: trucksight-db
    plan: free
    databaseName: trucksight
